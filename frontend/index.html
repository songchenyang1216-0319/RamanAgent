<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RamanAgent 聊天式工作台</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-left">
        <div class="brand-small">RamanAgent</div>
        <div class="brand-title">甲醇拉曼光谱 Agent 工作台</div>
      </div>

      <div class="topbar-right">
        <div class="status-row">
          <div class="status-card">
            <span>后端</span>
            <strong id="backendStatus">检查中</strong>
          </div>
          <div class="status-card">
            <span>当前模型</span>
            <strong id="topModelVersion">加载中</strong>
          </div>
          <div class="status-card">
            <span>模型文件</span>
            <strong id="topArtifactStatus">检查中</strong>
          </div>
          <button id="skillsButton" type="button" class="status-card status-card-button">
            <span>Skills</span>
            <strong id="skillsButtonCount">加载中</strong>
          </button>
        </div>

        <div class="action-row">
          <div class="action-group model-menu-wrap">
            <button id="modelListBtn" type="button" class="pill-button">模型列表</button>
            <div id="modelListPopover" class="model-list-popover hidden" aria-hidden="true">
              <div class="model-list-head">
                <strong>可用模型</strong>
                <button id="closeModelListBtn" type="button" class="mini-ghost-button">关闭</button>
              </div>
              <div id="modelListBody" class="model-list-body"></div>
            </div>
          </div>
          <button id="recentExperimentBtn" type="button" class="pill-button" data-question="最近实验">最近实验</button>
          <button id="skillsManageBtn" type="button" class="pill-button">Skills 管理</button>
          <button id="refreshDashboardBtn" type="button" class="pill-button">刷新</button>
          <label class="debug-switch compact">
            <input id="chatDebug" type="checkbox" />
            <span>debug</span>
          </label>
          <button id="clearSessionBtn" type="button" class="pill-button ghost">清空会话</button>
        </div>

        <div class="session-row">
          <span>会话 ID：<strong id="sessionIdText">未创建</strong></span>
        </div>
      </div>
    </header>

    <main class="chat-main">
      <div id="chatMessages" class="chat-container"></div>
    </main>

    <footer class="composer-wrap">
      <div id="selectedFileChip" class="selected-file-chip hidden"></div>
      <div class="composer">
        <button id="fileButton" class="composer-icon-btn" type="button" title="上传 CSV 文件" aria-label="上传 CSV 文件">
          +
        </button>
        <textarea
          id="messageInput"
          class="composer-input"
          placeholder="输入问题，或点击 + 上传 CSV 光谱文件"
          rows="1"
        ></textarea>
        <button id="sendButton" class="send-btn" type="button">发送</button>
        <input id="fileInput" type="file" accept=".csv,text/csv" style="display: none" />
      </div>
      <p id="chatStatus" class="chat-status">正在初始化界面...</p>
    </footer>
  </div>

  <div id="skillsPanel" class="skills-panel hidden" aria-hidden="true">
    <div id="skillsPanelBackdrop" class="skills-panel-backdrop"></div>
    <aside class="skills-panel-drawer" role="dialog" aria-modal="true" aria-labelledby="skillsPanelTitle">
      <div class="skills-panel-header">
        <div>
          <p class="brand-small brand-small-panel">RamanAgent Skills</p>
          <h2 id="skillsPanelTitle">当前 Agent 已安装的能力模块</h2>
        </div>
        <button id="closeSkillsPanelBtn" type="button" class="mini-ghost-button">关闭</button>
      </div>
      <div class="skills-panel-toolbar">
        <button id="refreshSkillsBtn" type="button" class="pill-button small">刷新 Skills</button>
        <button id="uploadSkillBtn" type="button" class="pill-button small">上传 Skill</button>
        <input id="skillZipInput" type="file" accept=".zip,application/zip" style="display: none" />
      </div>
      <div id="skillsPanelStats" class="skills-panel-stats"></div>
      <div id="skillsPanelBody" class="skills-panel-body"></div>
    </aside>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
